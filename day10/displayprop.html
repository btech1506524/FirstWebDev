<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:brown
        }
        div .ex1{
            display: none;
        }
        div .ex2{
            display: block;
            background-color: bisque;
        }
        div .ex3{
            display: inline;
            background-color: violet;
    </style>
</head>
<body>
    <div>
      display:none,shows nothing;
      <p class="ex1">hello display none</p>
    </div>
    <div>
      display:block,occupies both the whole space;
      <p class="ex2">hello display none</p>
    </div>
    <div>
      display:inline,occupies the required amount like span tag;
      <p class="ex3">hello display inline</p>
    </div>
</body>
</html>
