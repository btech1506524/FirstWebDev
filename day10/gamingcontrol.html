<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Zone</title>

    <style>
        body{
            background-color: black;
            color: azure;
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
        }

        .title{
            text-align: center;
            color: aquamarine;
        }

        .playercard{
            background-color: black;
            padding: 20px;
            border: 1px solid white;
            border-radius: 10px;
            margin-top: 20px;
        }

        .badge{
            display: inline-block;
            background-color: coral;
            padding: 8px;
            margin-right: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .secret-message{
            display: none;
        }

        .game-container{
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .game-card{
            background-color: #1a1a1a;
            padding: 20px;
            width: 200px;
            border: 1px solid white;
            border-radius: 10px;
            text-align: center;
        }

        .game-card h2{
            color: blueviolet;
        }

        .game-card p{
            color: cornsilk;
        }
    </style>
</head>

<body>

    <h1 class="title">Game Zone</h1>

    <div class="playercard">
        <h2>Player: Shadow Ninja</h2>
        <p>Level 99 Warrior</p>
    </div>

    <div class="badges">
        <span class="badge">Pro</span>
        <span class="badge">Fast</span>
        <span class="badge">Leader</span>
    </div>

    <div class="secret-message">
        Secret Weapon Unlocked
    </div>

    <div class="game-container">

        <div class="game-card">
            <h2>Minecraft</h2>
            <p>Building Adventure</p>
        </div>

        <div class="game-card">
            <h2>FIFA</h2>
            <p>Football Game</p>
        </div>

        <div class="game-card">
            <h2>Valorant</h2>
            <p>Shooting Battle</p>
        </div>

    </div>

</body>
</html>
